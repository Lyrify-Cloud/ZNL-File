name: Publish to npm (pnpm)

on:
  release:
    types: [published]

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node (from package.json engines)
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      - name: Install deps (no lifecycle scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Rebuild native deps
        run: pnpm rebuild zeromq

      - name: Test
        run: pnpm run test --if-present

      - name: Verify tag and package version match
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "tag=$TAG, package.json=$PKG_VERSION"
          [ "$TAG" = "$PKG_VERSION" ] || (echo "Tag and package.json version do not match" && exit 1)

      - name: Decide npm dist-tag
        id: disttag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *"-"* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "Will publish with dist-tag: $(sed -n 's/^tag=//p' "$GITHUB_OUTPUT")"

      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: pnpm publish --no-git-checks --access public --provenance --tag "${{ steps.disttag.outputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
