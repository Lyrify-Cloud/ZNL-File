name: Test on push

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node (from package.json engines)
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install deps (no lifecycle scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Rebuild native deps
        run: pnpm rebuild zeromq

      - name: Test
        run: pnpm run test
